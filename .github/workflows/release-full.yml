name: Full Release (Build & Publish)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: always

jobs:
  # STAGE 1: Build Native Libraries
  build-native:
    name: Build Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            lib_path: target/release/xcelerate_core.dll
          - os: ubuntu-latest
            lib_path: target/release/libxcelerate_core.so
          - os: macos-latest
            lib_path: target/release/libxcelerate_core.dylib
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cache Native Library
        id: cache-native
        uses: actions/cache@v4
        with:
          path: ${{ matrix.lib_path }}
          key: ${{ runner.os }}-native-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'src/**', 'build.rs') }}
      - name: Build Core
        if: steps.cache-native.outputs.cache-hit != 'true'
        run: cargo build --release
      - name: Upload Native Artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-lib-${{ matrix.os }}
          path: ${{ matrix.lib_path }}

  # STAGE 2: Generate Bindings & Packages
  generate-bindings:
    name: Generate Multi-Language Bindings
    needs: build-native
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: native-libs
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
      - name: Cache Cargo Binaries
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-uniffi-tools-v1
      - name: Install & Verify Generation Tools
        if: steps.cache-tools.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip build wheel
          cargo install uniffi-bindgen-cs --git https://github.com/NordSecurity/uniffi-bindgen-cs --tag v0.10.0+v0.29.4 --force
          cargo install uniffi-bindgen-node-js --force
          $cargoBin = "$env:USERPROFILE\.cargo\bin"
          $cargoBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:PATH = "$cargoBin;$env:PATH"
          uniffi-bindgen-cs --version
      - name: Setup Cargo Path (Cached)
        if: steps.cache-tools.outputs.cache-hit == 'true'
        shell: pwsh
        run: |
          $cargoBin = "$env:USERPROFILE\.cargo\bin"
          $cargoBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Organize Binaries
        shell: bash
        run: |
          mkdir -p target/release
          cp native-libs/native-lib-windows-latest/xcelerate_core.dll target/release/
          cp native-libs/native-lib-ubuntu-latest/libxcelerate_core.so target/release/
          cp native-libs/native-lib-macos-latest/libxcelerate_core.dylib target/release/
          mkdir -p bindings/csharp
          cp target/release/*.dll target/release/*.so target/release/*.dylib bindings/csharp/
      - name: Run Bindgen Scripts
        run: python scripts/generate_all.py
        env:
          SKIP_RUST_BUILD: "true"
      - name: Consolidate Packages
        shell: pwsh
        run: |
          mkdir -p dist-final
          Write-Host "Consolidating packages..."
          $files = Get-ChildItem -Path bindings -Include *.whl, *.tar.gz, *.tgz, *.nupkg -Recurse
          if ($files.Count -eq 0) {
              Write-Error "No package files found in bindings/ directory!"
              exit 1
          }
          foreach ($file in $files) {
              Write-Host "Copying $($file.FullName) to dist-final/"
              Copy-Item -Path $file.FullName -Destination dist-final/
          }
          ls dist-final/
      - name: Upload Package Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: language-packages
          path: dist-final/

  # STAGE 3: Publish to Registries
  publish:
    name: Publish to Registries
    needs: generate-bindings
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: language-packages
          path: dist-packages

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        working-directory: dist-packages
        run: |
          for f in *.tgz; do
            if [ -f "$f" ]; then
              echo "Attempting to publish $f..."
              npm publish "$f" --access public --provenance || npm publish "$f" --access public
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Prepare PyPI Artifacts
        id: pypi-prep
        run: |
          mkdir -p dist-pypi
          cp dist-packages/*.whl dist-pypi/ 2>/dev/null || true
          cp dist-packages/*.tar.gz dist-pypi/ 2>/dev/null || true
          if [ -n "$(ls -A dist-pypi)" ]; then
            echo "has_artifacts=true" >> $GITHUB_OUTPUT
            echo "PyPI artifacts found."
          else
            echo "has_artifacts=false" >> $GITHUB_OUTPUT
            echo "No PyPI artifacts found."
          fi

      - name: Publish to PyPI
        if: steps.pypi-prep.outputs.has_artifacts == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-pypi/
          skip-existing: true

      - name: Publish to NuGet
        run: dotnet nuget push dist-packages/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json

      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }} --no-verify --allow-dirty

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-packages/*
