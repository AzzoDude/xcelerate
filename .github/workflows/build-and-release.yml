name: Build and Release Xcelerate

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # STAGE 1: Build Native Libraries
  build-native:
    name: Build Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: xcelerate_core.dll
            lib_path: target/release/xcelerate_core.dll
          - os: ubuntu-latest
            artifact_name: libxcelerate_core.so
            lib_path: target/release/libxcelerate_core.so
          - os: macos-latest
            artifact_name: libxcelerate_core.dylib
            lib_path: target/release/libxcelerate_core.dylib

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build Core
        run: cargo build --release

      - name: Upload Native Artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-lib-${{ matrix.os }}
          path: ${{ matrix.lib_path }}

  # STAGE 2: Generate Bindings & Packages
  generate-bindings:
    name: Generate Multi-Language Bindings
    needs: build-native
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Native Libraries
        uses: actions/download-artifact@v4
        with:
          path: native-libs

      - name: Setup Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache UniFFI Tools
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\bin\uniffi-bindgen-node-js.exe
            ~\.cargo\bin\uniffi-bindgen-cs.exe
          key: ${{ runner.os }}-uniffi-tools-v3

      - name: Install Generation Tools
        shell: pwsh
        run: |
          python -m pip install --upgrade pip build wheel
          
          # Install UniFFI Binders (skip if cached)
          if (-not (Test-Path "$HOME\.cargo\bin\uniffi-bindgen-node-js.exe")) {
            cargo install uniffi-bindgen-node-js
          }
          
          if (-not (Test-Path "$HOME\.cargo\bin\uniffi-bindgen-cs.exe")) {
            # Use the version compatible with UniFFI 0.29
            cargo install uniffi-bindgen-cs --git https://github.com/NordSecurity/uniffi-bindgen-cs --tag v0.10.0+v0.29.4
          }
          
          # Pre-build internal bindgen
          cargo build --features=uniffi/cli --bin uniffi-bindgen
          
          # Set PATH using the most reliable method for Windows runner
          "$HOME\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          
          # Verify tools are present
          uniffi-bindgen-node-js --version
          uniffi-bindgen-cs --version

      - name: Organize Binaries
        run: |
          mkdir -p target/release
          cp native-libs/native-lib-windows-latest/xcelerate_core.dll target/release/
          cp native-libs/native-lib-ubuntu-latest/libxcelerate_core.so target/release/
          cp native-libs/native-lib-macos-latest/libxcelerate_core.dylib target/release/
          cp target/release/xcelerate_core.dll bindings/csharp/
          cp target/release/libxcelerate_core.so bindings/csharp/
          cp target/release/libxcelerate_core.dylib bindings/csharp/

      - name: Run Bindgen Scripts
        run: python scripts/generate_all.py

      - name: Upload Package Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: language-packages
          path: |
            bindings/python/dist/*
            bindings/javascript/*.tgz
            bindings/csharp/bin/Release/*.nupkg

  # STAGE 3: Publish to Registries
  publish:
    name: Publish to Registries
    needs: generate-bindings
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Packages
        uses: actions/download-artifact@v4
        with:
          name: language-packages
          path: dist-packages

      - name: Setup Node.js (Auth)
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Python (Auth)
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Publish to npm
        working-directory: dist-packages
        run: |
          # Find the .tgz file and publish it
          $tgz = Get-ChildItem -Filter *.tgz
          npm publish $tgz.FullName --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to PyPI
        run: |
          python -m pip install twine
          python -m twine upload dist-packages/*.whl dist-packages/*.tar.gz
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

      - name: Publish to NuGet
        run: dotnet nuget push dist-packages/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-packages/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
