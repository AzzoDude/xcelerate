name: Build and Release Xcelerate

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # STAGE 1: Build Native Libraries
  build-native:
    name: Build Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: xcelerate_core.dll
            lib_path: target/release/xcelerate_core.dll
          - os: ubuntu-latest
            artifact_name: libxcelerate_core.so
            lib_path: target/release/libxcelerate_core.so
          - os: macos-latest
            artifact_name: libxcelerate_core.dylib
            lib_path: target/release/libxcelerate_core.dylib
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: native-lib-${{ matrix.os }}
          path: ${{ matrix.lib_path }}

  # STAGE 2: Generate Bindings & Packages
  generate-bindings:
    name: Generate Multi-Language Bindings
    needs: build-native
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: native-libs
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Generate & Consolidate
        shell: pwsh
        run: |
          # (Your existing uniffi-bindgen and python scripts/generate_all.py logic here)
          python scripts/generate_all.py
          mkdir -p dist-final
          Get-ChildItem -Path bindings -Filter *.whl -Recurse | Copy-Item -Destination dist-final/
          Get-ChildItem -Path bindings -Filter *.tgz -Recurse | Copy-Item -Destination dist-final/
          Get-ChildItem -Path bindings -Filter *.nupkg -Recurse | Copy-Item -Destination dist-final/

      - uses: actions/upload-artifact@v4
        with:
          name: language-packages
          path: dist-final/

  # STAGE 3: Secure Publish (OIDC)
  publish:
    name: Publish to Registries
    needs: generate-bindings
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest # Switched to Linux for easier OIDC handling
    
    permissions:
      id-token: write   # CRITICAL: Allows OIDC token generation
      contents: write   # Required for creating GitHub Releases
      attestations: write # Optional: For npm provenance signatures

    steps:
      - uses: actions/checkout@v4

      - name: Download Packages
        uses: actions/download-artifact@v4
        with:
          name: language-packages
          path: dist-packages

      # --- NPM (Trusted Publishing) ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Recommended for npm 11+
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        working-directory: dist-packages
        run: |
          # Trusted Publishing ignores NODE_AUTH_TOKEN if OIDC is available
          npm publish *.tgz --access public --provenance

      # --- PyPI (Trusted Publishing) ---
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-packages/
          # No token or username needed!

      # --- NuGet & Crates (Traditional Tokens) ---
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Publish to NuGet
        run: dotnet nuget push dist-packages/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # --- GitHub Release ---
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-packages/*