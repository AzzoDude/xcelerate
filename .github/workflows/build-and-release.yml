name: Build and Release Xcelerate

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-native:
    name: Build Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: xcelerate_core.dll
            lib_path: target/release/xcelerate_core.dll
          - os: ubuntu-latest
            artifact_name: libxcelerate_core.so
            lib_path: target/release/libxcelerate_core.so
          - os: macos-latest
            artifact_name: libxcelerate_core.dylib
            lib_path: target/release/libxcelerate_core.dylib

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build Core
        run: cargo build --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-lib-${{ matrix.os }}
          path: ${{ matrix.lib_path }}

  package-and-release:
    name: Package Bindings
    needs: build-native
    runs-on: windows-latest # We use Windows for packaging to support .NET and UniFFI CS
    steps:
      - uses: actions/checkout@v4

      - name: Download Native Libraries
        uses: actions/download-artifact@v4
        with:
          path: native-libs

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: 'bindings/csharp/Xcelerate.CSharp.csproj'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip build twine
          
          # Install UniFFI Binders
          dotnet tool install --global UniFFI.Bindgen.CS --version 0.1.1 || true
          npm install -g uniffi-bindgen-node-js
          
          # Add tools to PATH (for the rest of this job)
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
          echo "$(npm config get prefix)/bin" >> $GITHUB_PATH

      - name: Organize Native Libraries
        run: |
          mkdir -p target/release
          cp native-libs/native-lib-windows-latest/xcelerate_core.dll target/release/
          cp native-libs/native-lib-ubuntu-latest/libxcelerate_core.so target/release/
          cp native-libs/native-lib-macos-latest/libxcelerate_core.dylib target/release/
          
          # Organize for C# NuGet (RID structure)
          cp target/release/xcelerate_core.dll bindings/csharp/
          cp target/release/libxcelerate_core.so bindings/csharp/
          cp target/release/libxcelerate_core.dylib bindings/csharp/

      - name: Generate All Bindings
        run: python scripts/generate_all.py

      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: bindings/javascript
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: bindings/python
        run: |
          python -m pip install twine
          python -m twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

      - name: Publish to NuGet
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: bindings/csharp
        run: dotnet nuget push bin/Release/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json

      - name: Publish to crates.io
        if: startsWith(github.ref, 'refs/tags/')
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            bindings/python/dist/*.whl
            bindings/javascript/*.tgz
            bindings/csharp/bin/Release/*.nupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
