name: Build Core (Native Only)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['src/**', 'Cargo.*', 'build.rs']

env:
  CARGO_TERM_COLOR: always

jobs:
  build-native:
    name: Build Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: amd64
            target: x86_64-pc-windows-msvc
            lib_name: xcelerate_core.dll
          - os: windows-latest
            arch: arm64
            target: aarch64-pc-windows-msvc
            lib_name: xcelerate_core.dll
          - os: ubuntu-latest
            arch: amd64
            target: x86_64-unknown-linux-gnu
            lib_name: libxcelerate_core.so
          - os: ubuntu-latest
            arch: arm64
            target: aarch64-unknown-linux-gnu
            lib_name: libxcelerate_core.so
          - os: macos-latest
            arch: amd64
            target: x86_64-apple-darwin
            lib_name: libxcelerate_core.dylib
          - os: macos-latest
            arch: arm64
            target: aarch64-apple-darwin
            lib_name: libxcelerate_core.dylib
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Cross-Compilation Tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build Core
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Upload Native Artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-lib-${{ matrix.os }}-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/${{ matrix.lib_name }}
