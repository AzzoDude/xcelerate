name: Publish Only (From Existing Artifacts)

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Run ID of the "Build Packages" workflow to publish from'
        required: false
        default: ''

jobs:
  publish:
    name: Publish to Registries
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Find Latest Build Run ID
        id: find-run
        run: |
          if [ "${{ github.event.inputs.run_id }}" != "" ]; then
            echo "run_id=${{ github.event.inputs.run_id }}" >> $GITHUB_OUTPUT
          else
            RUN_ID=$(gh run list --workflow "Build Packages (Core + Bindings)" --status success --limit 1 --json databaseId --jq '.[0].databaseId')
            if [ -z "$RUN_ID" ]; then
              echo "Error: No successful 'Build Packages' runs found."
              exit 1
            fi
            echo "Found latest successful run: $RUN_ID"
            echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: language-packages
          path: dist-packages
          run-id: ${{ steps.find-run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: |
          cd dist-packages
          for f in *.tgz; do
            if [ -f "$f" ]; then
              echo "Extracting metadata from $f..."
              PACKAGE_JSON=$(tar -xOzf "$f" package/package.json)
              PACKAGE_NAME=$(echo "$PACKAGE_JSON" | node -p "JSON.parse(fs.readFileSync(0)).name")
              PACKAGE_VERSION=$(echo "$PACKAGE_JSON" | node -p "JSON.parse(fs.readFileSync(0)).version")
              
              if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
                echo "Version $PACKAGE_VERSION of $PACKAGE_NAME already exists. Skipping."
              else
                echo "Publishing $f to npm..."
                npm publish "$f" --access public
              fi
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Prepare PyPI Artifacts
        run: |
          mkdir -p dist-pypi
          # Copy only Python-specific files to the dedicated directory
          cp dist-packages/*.whl dist-pypi/ 2>/dev/null || true
          cp dist-packages/*.tar.gz dist-pypi/ 2>/dev/null || true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Point to the isolated directory containing only Python files
          packages-dir: dist-pypi/
          skip-existing: true

      - name: Publish to NuGet
        run: |
          dotnet nuget push dist-packages/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Publish to crates.io
        run: |
          CRATE_NAME="xcelerate"
          CRATE_VERSION=$(ls dist-packages/*.tgz | head -n 1 | grep -oP '\d+\.\d+\.\d+' | head -n 1)
          
          if cargo search "$CRATE_NAME" --limit 1 | grep -q "$CRATE_VERSION"; then
            echo "Version $CRATE_VERSION of $CRATE_NAME already exists. Skipping."
          else
            cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.run_number }}"
          files: dist-packages/*
